name: Nightly Maintenance

on:
  schedule: [{ cron: "0 2 * * *" }]
  workflow_dispatch:

jobs:
  db-backup:
    runs-on: ubuntu-latest
    steps:
    - name: Backup PostgreSQL to S3
      env:
        DB_HOST: ${{ secrets.DB_HOST }}
        AWS_ACCESS_KEY_ID: ${{ secrets.AWS_KEY }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET }}
      run: |
        if [ -z "${{ secrets.DB_HOST }}" ] || [ -z "${{ secrets.AWS_KEY }}" ] || [ -z "${{ secrets.AWS_SECRET }}" ]; then
          echo "⚠️ Database backup credentials not configured (secrets.DB_HOST, AWS_KEY, or AWS_SECRET is empty)."
          echo "Skipping S3 backup step gracefully."
          exit 0
        fi
        TIMESTAMP=$(date +%Y%m%d_%H%M%S)
        pg_dump "$DB_HOST/mydb" | gzip | aws s3 cp - "s3://my-backups/db-$TIMESTAMP.sql.gz"
        echo "Backup: db-$TIMESTAMP.sql.gz"

  dependency-update:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - run: npm audit --audit-level=high
    - uses: aquasecurity/trivy-action@master
      with:
        scan-type: fs
        scan-ref: .
        severity: HIGH,CRITICAL